<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I am coderr</title>

<style>
/* Apple System Fonts */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
}

body {
    min-height: 99vh;
    background-color: #000;
    overflow-x: hidden;
    color: #fff;
    padding-bottom: 50px;
    /* --- NEW PHOTO-REALISTIC BACKGROUND --- */
    background-image: url('tanjiro.jpg'); /* Replace this path with the actual image path */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
}

/* macOS Style Subdued Ambient Background Blobs */
body::before, body::after, .bg-blob {
    content: "";
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
    /* Subdue these to make the image the star */
    opacity: 0.3;
}

body::before {
    width: 600px;
    height: 600px;
    background: #5e5ce6;
    top: -150px;
    left: -150px;
    animation: float1 15s infinite alternate;
}

body::after {
    width: 500px;
    height: 500px;
    background: #ff2d55;
    bottom: -150px;
    right: -100px;
    animation: float2 12s infinite alternate;
}

.bg-blob {
    width: 700px;
    height: 700px;
    background: #32ade6;
    top: 20%;
    left: 20%;
    animation: float3 20s infinite alternate;
    opacity: 0.2;
}

@keyframes float1 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(200px, 200px) scale(1.2); }
}
@keyframes float2 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-200px, -200px) scale(1.3); }
}
@keyframes float3 {
    0% { transform: translate(0, 0); }
    100% { transform: translate(300px, -100px); }
}

/* Apple Glassmorphism Utility Class */
.apple-glass {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(35px) saturate(200%);
    -webkit-backdrop-filter: blur(35px) saturate(200%);
    /* Top and left borders lighter to create 3D glass edge */
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-top: 1px solid rgba(255, 255, 255, 0.35);
    border-left: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    border-radius: 24px;
}

.container {
    width: 90%;
    max-width: 1100px;
    margin: auto;
}

header {
    margin: 30px auto;
    padding: 30px;
    text-align: center;
    animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Logo Styling */
.logo {
    height: 70px;
    width: auto;
    margin-bottom: 15px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

header h1 {
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 5px;
}

header p {
    color: rgba(255, 255, 255, 0.7);
    font-weight: 400;
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

.admin-panel {
    padding: 30px;
    margin-bottom: 50px;
    transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.admin-panel:hover {
    transform: translateY(-4px);
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
}

h2 {
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 15px;
}

/* File Input Styling */
input[type=file] {
    width: 100%;
    margin: 15px 0;
    color: white;
    font-size: 15px;
}
input[type=file]::file-selector-button {
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 8px 16px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    margin-right: 15px;
    transition: 0.3s;
}
input[type=file]::file-selector-button:hover {
    background: rgba(255, 255, 255, 0.3);
}

/* Apple Style Buttons */
button {
    border: none;
    padding: 12px 28px;
    border-radius: 20px; /* Pill shape */
    cursor: pointer;
    color: white;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.5px;
    transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
}

button:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateY(-2px) scale(1.02);
}

.section-title {
    margin-top: 20px;
    font-size: 24px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

.pdf-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 40px; /* Increased gap for reflections */
    padding-bottom: 80px;
}

/* --- THE MIRROR & GLASS CARD --- */
.card {
    position: relative;
    padding: 25px;
    overflow: hidden;
    transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    
    /* Literal mirror reflection underneath */
    -webkit-box-reflect: below 15px linear-gradient(transparent, transparent 60%, rgba(255,255,255,0.2));
}

/* Sweeping Glass Shine Effect */
.card::before {
    content: "";
    position: absolute;
    top: 0; 
    left: -150%;
    width: 50%; 
    height: 100%;
    background: linear-gradient(
        to right, 
        rgba(255, 255, 255, 0) 0%, 
        rgba(255, 255, 255, 0.3) 50%, 
        rgba(255, 255, 255, 0) 100%
    );
    transform: skewX(-25deg);
    transition: 0.7s ease;
    z-index: 1;
    pointer-events: none;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
    background: rgba(255, 255, 255, 0.15);
}

.card:hover::before {
    left: 200%; /* Triggers the mirror shine sweep across the card */
}

.card h3 {
    margin-bottom: 20px;
    word-break: break-word;
    font-size: 18px;
    font-weight: 500;
}

.actions {
    display: flex;
    gap: 12px;
    position: relative;
    z-index: 2; /* Keeps buttons clickable above the shine */
}

.view-btn {
    background: rgba(48, 209, 88, 0.2);
    border: 1px solid rgba(48, 209, 88, 0.5);
    color: #30d158;
}
.view-btn:hover {
    background: rgba(48, 209, 88, 0.35);
}

.download-btn {
    background: rgba(10, 132, 255, 0.2);
    border: 1px solid rgba(10, 132, 255, 0.5);
    color: #0a84ff;
}
.download-btn:hover {
    background: rgba(10, 132, 255, 0.35);
}

a {
    text-decoration: none;
}

/* Card Load Animation */
.card {
    animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes cardAppear {
    from { opacity: 0; transform: translateY(50px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>

<div class="bg-blob"></div>

<header class="apple-glass container">
    <img src="iamcoderr.jpg" alt="Logo" class="logo">
    
    <h1>I am coderr</h1>
    <p>Upload, View & Download</p>
</header>

<div class="container">
    <div class="admin-panel apple-glass">
        <h2>Admin Upload PDF</h2>
        <input type="file" id="pdfInput" accept=".pdf">
        <br>
        <button onclick="uploadPDF()">Upload PDF</button>
    </div>

    <h2 class="section-title">Available PDFs</h2>
    <br>

    <div class="pdf-list" id="pdfList"></div>
</div>

<script>
const pdfList = document.getElementById("pdfList");

// --- BACKGROUND AUTOMATION: Load saved PDFs when the page opens ---
let savedPDFs = JSON.parse(localStorage.getItem('myPDFLibrary')) || [];

window.onload = function() {
    savedPDFs.forEach(pdf => {
        createPDFCard(pdf.name, pdf.data);
    });
};

function uploadPDF() {
    const fileInput = document.getElementById("pdfInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a PDF file");
        return;
    }

    // Read the file and convert it to saveable data
    const reader = new FileReader();
    
    reader.onload = function(event) {
        const base64Data = event.target.result;

        // --- BACKGROUND AUTOMATION: Save to browser storage ---
        try {
            savedPDFs.push({ name: file.name, data: base64Data });
            localStorage.setItem('myPDFLibrary', JSON.stringify(savedPDFs));
            
            // Show it on the screen
            createPDFCard(file.name, base64Data);
            
            // Clear the input
            fileInput.value = "";
        } catch (error) {
            // Browsers limit local storage to ~5MB.
            alert("File too large! Browser storage limit reached. Please upload a smaller PDF.");
        }
    };

    reader.readAsDataURL(file);
}

// Helper function to build the HTML card with Apple Glass class
function createPDFCard(fileName, fileData) {
    const card = document.createElement("div");
    card.className = "card apple-glass";

    card.innerHTML = `
        <h3>${fileName}</h3>
        <div class="actions">
            <a href="${fileData}" target="_blank">
                <button class="view-btn">View</button>
            </a>
            <a href="${fileData}" download="${fileName}">
                <button class="download-btn">Download</button>
            </a>
        </div>
    `;

    pdfList.appendChild(card);
}
</script>

</body>
</html>
